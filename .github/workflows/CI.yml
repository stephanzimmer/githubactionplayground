name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  jest-tests:
    name: Jest Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: npm install
      - run: npm test

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: npx newman run postman/collection.json